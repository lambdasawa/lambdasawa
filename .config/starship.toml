format = """\
  $username\
  $hostname\
  $directory\
  $env_var\
  $git_branch\
  $git_commit\
  $git_state\
  $git_status\
  $hg_branch\
  $time\
  $cmd_duration\
  $jobs\
  $battery\
  $memory_usage\
  $aws\
  $gcloud\
  $kubernetes\
  $python\
  $ruby\
  $nodejs\
  $java\
  $dotnet\
  $golang\
  $rust\
  $dart\
  $terraform\
  $line_break\
  $character\
"""

[env_var.STARSHIP_SHELL]
default = ""
format = "([$env_value](bold green) )"

[env_var.ENV]
default = ""
format = "([$env_value](bold green) )"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = ""

[git_status]
ahead = "ahead "
behind = "behind "
conflicted = "conflicted "
deleted = "deleted "
diverged = "diverged "
format = "[$all_status$ahead_behind](bold yellow)"
modified = "modified "
renamed = "renamed "
staged = "staged "
stashed = "stashed "
untracked = "untracked "

[time]
disabled = false
format = '[$time](white) '
time_format = "%T"
utc_time_offset = "-5"

[cmd_duration]
format = "[$duration](white) "
min_time = 0
show_milliseconds = true
style = "bold white"

[aws]
format = "[aws:$profile/$region](blue) "

[aws.region_aliases]
ap-northeast-1 = "AN1"
us-east-1 = "UE1"

[gcloud]
format = "[gcp:$project](cyan) "

[kubernetes]
format = "[k8s:$context/$namespace]($style) "

[terraform]
format = "[tf:$version]($style) "

[golang]
format = "[go:$version]($style) "

[rust]
format = "[rust:$version]($style) "

[java]
format = "[java:$version]($style) "

[nodejs]
format = "[node:$version]($style) "

[ruby]
format = "[rb:$version]($style) "

[python]
format = "[py:$version]($style) "

[dart]
format = "[dart:$version]($style) "

[character]
error_symbol = "[\\( ^ω^ ;\\)](bold red)"
success_symbol = "[\\( ◠‿◠ \\)](bold green)"
vicmd_symbol = "[\\( ◠‿◠ \\)](bold green)"

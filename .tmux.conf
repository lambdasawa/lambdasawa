set -g @tpm_plugins '\
  tmux-plugins/tpm \
  schasse/tmux-jump \
  tmux-plugins/tmux-open \
  tmux-plugins/tmux-resurrect \
  tmux-plugins/tmux-continuum \
  fcsonline/tmux-thumbs \
'

set -g mouse on

set -g default-command "if command -v fish 2>&1 >/dev/null; then env TERM=xterm fish; else env TERM=xterm bash; fi"

set-option -g history-limit 50000

set-option -g status-position top
set-option -g status-interval 60
set-option -g status-left "  #[fg=#ff8c00]#S"
set-option -g status-left-length 20
set-option -g status-right "  "
set-option -g status-right-length 20
set-option -g status-justify "centre"
set-window-option -g window-status-format "#I:#W"
set-window-option -g window-status-current-format "#[fg=#ff8c00]#I:#W"
set -g status-fg white
set -g status-bg "colour016"
set -g pane-border-style fg="white",bg="default"
set -g pane-active-border-style fg="#ff8c00",bg="default"

set-window-option -g mode-keys vi

unbind C-b
set -g prefix C-u
bind u send-prefix

bind r source-file ~/.tmux.conf

set -g base-index 1
setw -g pane-base-index 1

bind c new-window
bind | split-window -h
bind - split-window -v

bind t run-shell "fish -c \"tmux-popup\""

bind -n M-L next-window
bind -n M-J switch-client -n
bind -n M-K switch-client -p
bind -n M-H previous-window
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

set -g @jump-key 'C-j'

set -g @thumbs-key j

set -g @open 'o'
set -g @open-editor 'C-o'
set -g @open-S 'https://www.google.com/search?q='

run-shell '~/.tmux/plugins/tpm/tpm'
